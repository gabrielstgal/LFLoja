spring.application.name=lfclothing
spring.config.import=optional:file:.env[.properties]

# Banco de Dados PostgreSQL Local
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracoes de JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
jwt.cookie-domain=${JWT_COOKIE_DOMAIN:}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# WhatsApp da loja
loja.whatsapp=${LOJA_WHATSAPP}

# Otimizacao de memoria
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.leak-detection-threshold=30000

# Compressao HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

# Cache
spring.cache.type=caffeine

# Upload de imagens (maximo 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# AbacatePay (gateway de pagamento PIX)
abacatepay.api-key=${ABACATEPAY_API_KEY:}
abacatepay.base-url=${ABACATEPAY_BASE_URL:https://api.abacatepay.com/v2}
abacatepay.webhook-secret=${ABACATEPAY_WEBHOOK_SECRET:}
abacatepay.pix-expires-seconds=${ABACATEPAY_PIX_EXPIRES:3600}
